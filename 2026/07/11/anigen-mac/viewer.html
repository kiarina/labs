<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AniGen macOS results</title>
  <script type="module" src="node_modules/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; background: #111827; color: #f9fafb; }
    header { display: flex; gap: 1rem; align-items: center; padding: .8rem 1rem; }
    label { display: flex; gap: .4rem; align-items: center; }
    main { display: grid; grid-template-columns: minmax(240px, 28rem) 1fr; height: calc(100vh - 4rem); }
    aside { background: #1f2937; padding: 1rem; overflow: auto; }
    aside img { width: 100%; max-height: 42%; object-fit: contain; background: white; margin-bottom: 1rem; }
    model-viewer { width: 100%; height: 100%; background: radial-gradient(#e5e7eb, #9ca3af); }
    select { font: inherit; padding: .35rem; }
    @media (max-width: 700px) { main { grid-template-columns: 1fr; } aside { display: none; } }
  </style>
</head>
<body>
  <header>
    <strong>AniGen Apple Silicon preview</strong>
    <label>Case <select id="case"><option>miineko1</option><option>miineko2</option></select></label>
    <label>Model <select id="kind"><option value="mesh">Rigged mesh</option><option value="skeleton">Skeleton</option></select></label>
    <span id="status"></span>
  </header>
  <main>
    <aside>
      <h2>Input</h2><img id="input" alt="Original input">
      <h2>Processed input</h2><img id="processed" alt="Processed input">
    </aside>
    <model-viewer id="viewer" camera-controls auto-rotate interaction-prompt="none"
      shadow-intensity="1" exposure="1" environment-image="neutral"></model-viewer>
  </main>
  <script>
    const inputs = {
      miineko1: "../../../../tests/assets/jpg/miineko1_1254x1254_159kb.jpg",
      miineko2: "../../../../tests/assets/jpg/miineko2_1086x1448_219kb.jpg",
    };
    const params = new URLSearchParams(location.search);
    const caseSelect = document.querySelector("#case");
    const kindSelect = document.querySelector("#kind");
    caseSelect.value = params.get("case") || "miineko1";
    kindSelect.value = params.get("kind") || "mesh";
    async function update() {
      const name = caseSelect.value;
      document.querySelector("#input").src = inputs[name];
      document.querySelector("#processed").src = `results/${name}/processed_image.png`;
      const model = `results/${name}/${kindSelect.value}.glb`;
      const response = await fetch(model, { method: "HEAD" });
      document.querySelector("#status").textContent = response.ok ? "" : "Generation failed: no GLB";
      document.querySelector("#viewer").src = response.ok ? model : "";
    }
    caseSelect.addEventListener("change", update);
    kindSelect.addEventListener("change", update);
    update();
  </script>
</body>
</html>
